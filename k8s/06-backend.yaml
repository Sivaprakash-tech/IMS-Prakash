---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ims
  labels:
    app: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      name: http

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ims
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ims-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http

          envFrom:
            - configMapRef:
                name: ims-config
            - secretRef:
                name: ims-db-secret

          # ✅ UPDATED READINESS PROBE (more relaxed)
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10

          # ✅ UPDATED LIVENESS PROBE (much safer)
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 768Mi
