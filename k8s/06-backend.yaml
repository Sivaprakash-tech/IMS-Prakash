---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: ims
  labels: { app: backend }
spec:
  type: NodePort
  selector: { app: backend }
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080      # mapped to host:8000 by kind-cluster.yaml
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ims
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend }
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: ims-backend:local
          imagePullPolicy: IfNotPresent     # use the kind-loaded local image
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: ims-config
            - secretRef:
                name: ims-db-secret
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 768Mi
