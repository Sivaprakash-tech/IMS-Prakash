# Demo creds. In production: kubectl create secret + sealed-secrets/external-secrets,
# never commit. Kept here as plaintext so `./deploy.sh` is hands-free for graders.
apiVersion: v1
kind: Secret
metadata:
  name: ims-db-secret
  namespace: ims
type: Opaque
stringData:
  POSTGRES_USER: ims
  POSTGRES_PASSWORD: ims_pw
  POSTGRES_DB: ims
  MONGO_USER: ims
  MONGO_PASSWORD: ims_pw
