---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ims
  labels: { app: postgres }
spec:
  clusterIP: None              # headless; backs the StatefulSet identity
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
      name: pg
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ims
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: timescale/timescaledb:2.16.1-pg16
          ports:
            - containerPort: 5432
              name: pg
          envFrom:
            - secretRef:
                name: ims-db-secret
          # Keep PGDATA off the volume root so initdb scripts run cleanly on first boot.
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ims", "-d", "ims"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ims", "-d", "ims"]
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: initdb
          configMap:
            name: ims-initdb
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 1Gi
