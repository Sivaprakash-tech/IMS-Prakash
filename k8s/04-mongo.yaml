---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: ims
  labels:
    app: mongo
spec:
  clusterIP: None
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      name: mongo

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: ims
spec:
  serviceName: mongo
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - containerPort: 27017
              name: mongo

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ims-db-secret
                  key: MONGO_USER
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ims-db-secret
                  key: MONGO_PASSWORD

          volumeMounts:
            - name: data
              mountPath: /data/db

          # ✅ FIXED READINESS PROBE (auth + timeout)
          readinessProbe:
            exec:
              command:
                - mongosh
                - "-u"
                - "ims"
                - "-p"
                - "ims_pw"
                - "--authenticationDatabase"
                - "admin"
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 5

          # ✅ FIXED LIVENESS PROBE (auth + safe timing)
          livenessProbe:
            exec:
              command:
                - mongosh
                - "-u"
                - "ims"
                - "-p"
                - "ims_pw"
                - "--authenticationDatabase"
                - "admin"
                - "--quiet"
                - "--eval"
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 20
            failureThreshold: 5

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi

  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
