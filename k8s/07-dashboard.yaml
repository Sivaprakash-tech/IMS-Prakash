---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: ims
  labels: { app: dashboard }
spec:
  type: NodePort
  selector: { app: dashboard }
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30081      # mapped to host:8501 by kind-cluster.yaml
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: ims
spec:
  replicas: 1
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: dashboard
          image: ims-dashboard:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: BACKEND_URL
              value: http://backend:8000
            - name: DASHBOARD_REFRESH_SECONDS
              value: "2"
          readinessProbe:
            httpGet: { path: /_stcore/health, port: 8501 }
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /_stcore/health, port: 8501 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: "1"
              memory: 512Mi
