# Non-secret runtime config. Mirrors the docker-compose env block.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ims-config
  namespace: ims
data:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  MONGO_HOST: mongo
  MONGO_PORT: "27017"
  MONGO_DB: ims_signals
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  LOG_LEVEL: INFO
  QUEUE_MAXSIZE: "50000"
  QUEUE_BACKPRESSURE_THRESHOLD: "0.80"
  DEDUP_WINDOW_SECONDS: "10"
  WORKER_COUNT: "8"
  RATE_LIMIT_PER_SECOND: "1000"
  THROUGHPUT_LOG_INTERVAL: "5"
